# SSH Configuration
ssh.default_port=22
ssh.connect_timeout_seconds=30
ssh.command=claude --continue

# Bonjour/mDNS Configuration
bonjour.service_type=_ssh._tcp.
bonjour.domain=

# Terminal Configuration
terminal.font_name=monospace
terminal.font_size=11.0
terminal.foreground_color=#CCCCCC
terminal.background_color=#1A1A2E
terminal.caret_color=#E94560
terminal.term_type=xterm-256color
terminal.default_columns=80
terminal.default_rows=24

# Keychain/Secrets Configuration
keychain.service_name=com.olorin.claudette.ssh

# Logger Configuration
logger.tag=Claudette

# Splash Screen Configuration
splash.accent_color=#A855F7
splash.accent_color_light=#C084FC
splash.accent_color_dark=#7E22CE
splash.background_color=#0D0D1A
splash.app_name=Claudette
splash.cursor_symbol=>
splash.slogan=Your Code. Anywhere.
splash.footer_text=Powered by Olorin.ai

# Keyboard Accessory Configuration
keyboard.accessory_height=44.0
keyboard.accessory_background_color=#1A1A2E
keyboard.accessory_button_color=#252540
keyboard.accessory_button_text_color=#FFFFFF

# Session Persistence (tmux)
session.tmux_enabled=false
session.tmux_session_prefix=claudette
session.reconnect_max_attempts=5
session.reconnect_delay_seconds=2.0

# Network Probe
network_probe.interval_seconds=10.0
network_probe.timeout_seconds=5.0
network_probe.degraded_threshold_ms=200.0

# File Editor
file_editor.max_size_bytes=1048576
file_editor.font_name=monospace
file_editor.font_size=13.0

# Snippets
snippets.storage_file_name=snippets.json
